# ════════════════════════════════════════════════════════
# render.yaml — Render Free Tier Deployment Config
# Place this file in your project ROOT (same folder as server.js)
# ════════════════════════════════════════════════════════

services:
  - type: web
    name: trading-signal-platform
    runtime: node
    plan: free
    buildCommand: npm install && mkdir -p data/cache
    startCommand: node server.js
    healthCheckPath: /api/health
    autoDeploy: true

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: LOG_LEVEL
        value: info
      - key: ALPHA_VANTAGE_KEY
        sync: false
      - key: TWELVE_DATA_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_ENABLED
        value: "false"
